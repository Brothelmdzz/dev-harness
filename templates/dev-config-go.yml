# Go 项目配置模板
# 复制到项目根目录 .claude/dev-config.yml 后按需修改

project: my-go-project
tech_stack: go

gates:
  build: "go build ./..."
  test: "go test ./..."
  lint: "golangci-lint run"

tdd: false
default_profile: backend

permissions:
  auto_fix: true
  auto_continue: true
  require_approval:
    - prd
    - plan

# 防线参数（可选，覆盖默认值）
# limits:
#   stage_timeout: 1800
#   max_duration: 7200
#   max_retries: 3
