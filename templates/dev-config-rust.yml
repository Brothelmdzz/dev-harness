# Rust 项目配置模板
# 复制到项目根目录 .claude/dev-config.yml 后按需修改

project: my-rust-project
tech_stack: rust

gates:
  build: "cargo build"
  test: "cargo test"
  lint: "cargo clippy -- -D warnings"

tdd: false
default_profile: backend

permissions:
  auto_fix: true
  auto_continue: true
  require_approval:
    - prd
    - plan

# 防线参数（可选，覆盖默认值）
# limits:
#   stage_timeout: 2400
#   max_duration: 7200
#   max_retries: 3
