# Spring Boot 项目配置模板
# 复制到项目根目录 .claude/dev-config.yml 后按需修改

project: my-spring-boot-app
tech_stack: spring-boot

gates:
  build: "./gradlew build -x test"
  test: "./gradlew test"
  # lint: "./gradlew checkstyleMain"  # 按需取消注释

# Skill 覆盖（取消注释并填写你的 L1 Skill 名）
# skill_overrides:
#   audit: my-custom-audit
#   test: my-e2e-test

tdd: false
default_profile: backend

permissions:
  auto_fix: true
  auto_continue: true
  require_approval:
    - prd
    - plan

# 防线参数（可选，覆盖默认值）
# limits:
#   stage_timeout: 1800
#   max_duration: 7200
#   max_retries: 3

