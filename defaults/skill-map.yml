# Skill 别名映射 (v3.0)
# stage name → 按优先级尝试的 Skill 名称列表

skill_aliases:
  research:
    - research_codebase
    - research
    - generic-research

  prd:
    - create_prd
    - prd
    - generic-prd

  plan:
    - create_plan
    - plan
    - generic-plan

  implement:
    - implement_plan
    - implement
    - generic-implement

  validate:
    - validate_plan
    - validate
    - generic-validate

  audit:
    - audit-logic
    - audit
    - generic-audit

  test:
    - test-apis
    - test
    - generic-test

  docs:
    - update-api-docs
    - docs
    - generic-docs

  review:
    - generic-review
    - review

  wiki:
    - generic-wiki
    - wiki

  remember:
    - remember
    - generic-remember

# v3.3 新增: 轻量入口 Skill
# 这些是单 Skill 模式的入口，不走完整 pipeline
lightweight_entries:
  fix:
    mode: single
    skills: [implement, test]
  test-skill:
    mode: single
    skills: [test]
  audit-skill:
    mode: single
    skills: [audit]
  review-skill:
    mode: single
    skills: [review]
  ask:
    mode: conversation
    skills: []

# v3.0 新增: 角色 Profile 专用别名
# 解析时先尝试 profile 专用，再 fallback 到上面的通用列表
profile_aliases:
  frontend:
    research:
      - frontend-research
      - frontend_research
    implement:
      - frontend-implement
      - frontend_implement
    test:
      - frontend-test
      - frontend_test
    audit:
      - frontend-audit
      - frontend_audit

  product:
    prd:
      - product-prd
      - product_prd
    review:
      - product-review
      - product_review

  qa:
    test:
      - qa-e2e
      - qa-test
      - qa_test
    audit:
      - qa-regression
      - qa_regression
